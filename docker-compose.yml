services:
  wuiam:
    image: wuiam-wuiam:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__WUIAMDbContext: "${DB_CONNECTION_STRING}"
    restart: always
    volumes:
      - ./logs:/app/logs
